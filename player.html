<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feliz día Papá</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .icon {
    width: 200px;
    height: 200px;
    border-radius: 16px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.75rem;
    font-size: 80px;
  }
  .nombre {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .subtitulo {
    font-size: 16px;
    color: #1DB954;
    font-weight: 500;
    margin-bottom: 2rem;
  }
  .player-wrap {
    background: #181818;
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .player-wrap iframe {
    width: 100%;
    height: 80px;
    border: none;
    border-radius: 8px;
  }
  .hint {
    font-size: 12px;
    color: #555;
    margin-top: 10px;
    line-height: 1.5;
  }
  .badge {
    font-size: 12px;
    color: #444;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 1rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #1DB954; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎵</div>
  <div class="nombre" id="nombre">Cargando...</div>
  <div class="subtitulo">Feliz día Papá 💚</div>

  <div class="player-wrap">
    <iframe id="drive-player" allow="autoplay" allowfullscreen></iframe>
    <p class="hint">Dale al botón de reproducir para escuchar el mensaje</p>
  </div>

  <div class="badge">
    <div class="dot"></div>
    <span>Llavero musical · MtraRosi</span>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre') || 'Mensaje especial';
  const fileId = params.get('audio') || '';

  document.getElementById('nombre').textContent = nombre;
  document.title = 'Feliz día Papá · ' + nombre;

  if (fileId) {
    document.getElementById('drive-player').src =
      `https://drive.google.com/file/d/${fileId}/preview`;
  }
</script>
</body>
</html>
